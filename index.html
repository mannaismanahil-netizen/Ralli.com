<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* 1. YOUR ORIGINAL WEBSITE STYLING (Preserves your look) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #eaddbe; /* Matches your live tan background */
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            font-size: 3rem;
            letter-spacing: 4px;
            color: #2b221a;
            margin-top: 50px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* The Game Icon button placed right on your page */
        .icon-btn-container {
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            padding: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 50px;
        }

        .icon-btn-container:hover {
            transform: scale(1.04);
        }

        .icon-btn-container img {
            width: 90vw;
            max-width: 900px; /* Fits beautifully in your layout */
            height: auto;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }


        /* 2. THE FULLSCREEN GAME OVERLAY (Covers everything when active) */
        #screen-game {
            position: fixed; /* Forces it to stay fixed over the whole browser window */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f6ebd9; /* Background color behind your collage */
            z-index: 9999; /* Forces it to sit on top of everything else on the site */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .collage-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; /* Locks 16:9 aspect ratio so buttons don't misalign */
            max-height: 56.25vw;
        }

        .collage-bg {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps your entire collage perfectly visible on any monitor size */
        }


        /* 3. INTERACTIVE BOX OVERLAYS (Just like we did before!) */
        .boxes-interactive-overlay {
            position: absolute;
            bottom: 34%; /* Aligns vertically with the boxes in your drawing */
            left: 21%;   /* Fits right over the row of boxes */
            width: 58%;   
            height: 30%;  
            display: flex;
            justify-content: space-between;
        }

        .box-target {
            width: 26%;
            height: 100%;
            background: rgba(255, 255, 255, 0.0); /* Completely invisible hitboxes */
            border: none;
            cursor: pointer;
            outline: none;
            border-radius: 16px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        /* Makes the boxes interactive on hover */
        .box-target:hover {
            background-color: rgba(255, 255, 255, 0.15); /* Soft light flash */
            transform: translateY(-8px); /* Lifts up dynamically when hovered */
        }
    </style>
</head>
<body>

    <!-- Your standard website screen elements stay intact here -->
    <h1 class="game-header">Play Game</h1>

    <!-- Clickable Game Icon on your main page layout -->
    <button class="icon-btn-container" id="play-button">
        <img src="gameicon.jpg" alt="RALLI Game Icon">
    </button>


    <!-- THE FULLSCREEN GAME MODE (Hidden until you click the icon above) -->
    <div id="screen-game" class="game-screen hidden">
        <div class="collage-wrapper">
            <!-- Fullscreen collage background image -->
            <img src="pickabox.jpeg" alt="Pick a box collage" class="collage-bg">
            
            <!-- Interactive hovering targets over your 3 drawn boxes -->
            <div class="boxes-interactive-overlay">
                <button class="box-target" id="jeans-box" title="Box 1"></button>
                <button class="box-target" id="newspaper-box" title="Box 2"></button>
                <button class="box-target" id="combo-box" title="Box 3"></button>
            </div>
        </div>
    </div>

    <script>
        // Mechanics to trigger fullscreen overlay swap
        const screenGame = document.getElementById('screen-game');
        const playButton = document.getElementById('play-button');

        const boxJeans = document.getElementById('jeans-box');
        const boxNewspaper = document.getElementById('newspaper-box');
        const boxCombo = document.getElementById('combo-box');

        // Tap Icon -> Open Fullscreen Game Mode
        playButton.addEventListener('click', () => {
            screenGame.classList.remove('hidden');
        });

        // Box click functions (Ready for your new pictures!)
        boxJeans.addEventListener('click', () => {
            alert("Box 1 selected! Jeans coming up next.");
        });

        boxNewspaper.addEventListener('click', () => {
            alert("Box 2 selected! Newspaper coming up next.");
        });

        boxCombo.addEventListener('click', () => {
            alert("Box 3 selected! Combo coming up next.");
        });
    </script>
</body>
</html>
