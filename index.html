<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* Modern, minimal layout with a premium editorial feel */
        body {
            background-color: #f9f6f0; /* Smooth chic off-white cream background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 300; /* Light, elegant weight */
            letter-spacing: -1.5px;
            color: #1c1c1c; /* Sharp charcoal black for contrast */
            margin: 0;
            animation: fadeIn 1.5s ease-out;
        }

        .brand-name {
            font-weight: 700; /* Bold accentuation for RALLI */
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Subtle fade-in effect for a premium touch */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive scaling for mobile screens */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>welcome to <span class="brand-name">ralli</span>!</h1>
    </div>

</body>
</html>
