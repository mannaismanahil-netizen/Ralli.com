<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <!-- Importing a high-end, editorial serif font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Playfair Display', Georgia, serif;
            background-color: #1a1510; /* Elegant dark anchor fallback */
        }

        /* 1. The Background Image Container */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('myassss.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* 2. Advanced Color Grading Layer 
           This enhances the tones, deepens shadows, and balances the lighting */
        .color-grade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Warm cinematic gradient overlay */
            background: linear-gradient(
                135deg, 
                rgba(43, 27, 12, 0.45) 0%, 
                rgba(18, 12, 8, 0.65) 100%
            );
            /* Softens the motion blur of the original photo elegantly */
            backdrop-filter: blur(2px) contrast(1.1) brightness(0.9);
            z-index: -1;
        }

        /* 3. Centered Typography Layer */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .text-wrapper {
            animation: elegantFade 2.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Chic, lower-case editorial headline */
        h1 {
            font-size: 3.5rem;
            font-weight: 400;
            font-style: italic;
            /* High-contrast rich cream/soft luxury gold font color */
            color: #f7f3eb; 
            margin: 0 0 15px 0;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* The bold uppercase emphasis on the brand */
        .brand {
            font-style: normal;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            display: block;
            font-size: 4.5rem;
            margin-top: 10px;
            color: #ffffff;
        }

        /* Minimal subtitle for context */
        .subtitle {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #dfd5c6;
            margin-top: 25px;
            opacity: 0.85;
        }

        /* Ultra-smooth cinematic fade-in */
        @keyframes elegantFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .brand { font-size: 3.2rem; letter-spacing: 4px; }
            .subtitle { font-size: 0.75rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <!-- Background Photo Layer -->
    <div class="hero-bg"></div>

    <!-- Live Color Grading and Filtering Layer -->
    <div class="color-grade-overlay"></div>

    <!-- Centered Editorial Text -->
    <div class="main-container">
        <div class="text-wrapper">
            <h1>welcome to</h1>
            <span class="brand">RALLI</span>
            <div class="subtitle">A Sustainable Design Concept</div>
        </div>
    </div>

</body>
</html>
