<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #F3E6BD; /* Pearl Beige */
            font-family: 'Playfair Display', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            cursor: pointer; /* Shows the user the screen is clickable */
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* Minimalist Title Screen */
        h1 {
            font-size: 5.5rem;
            font-weight: 500;
            color: #260808; /* Graphite */
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 6px;
            transition: opacity 0.8s ease, transform 0.8s ease;
            user-select: none;
        }

        /* Class to fade out the text when tapped */
        .fade-out {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* ----------------------------------
           GAME / IMAGE LAYER STYLE
        ---------------------------------- */
        .game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        /* Reveals the game container smoothly */
        .game-layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Sleek picture frame style */
        .game-media-box {
            max-width: 80%;
            max-height: 70vh;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(38, 8, 8, 0.15); /* Soft dark brown shadow */
            transition: transform 0.5s ease;
        }

        .game-media-box:hover {
            transform: scale(1.02);
        }

        /* Responsive scaling for phone screens */
        @media (max-width: 768px) {
            h1 { 
                font-size: 3.5rem; 
                letter-spacing: 4px;
            }
            .game-media-box {
                max-width: 90%;
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>

    <div class="main-container" id="stage">
        <h1 id="brand-logo">RALLI.</h1>

        <div class="game-layer" id="game-view">
            <img src="myassss.jpg" alt="Ralli Game Concept" class="game-media-box" id="game-image">
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const logo = document.getElementById('brand-logo');
        const gameView = document.getElementById('game-view');
        const gameImage = document.getElementById('game-image');

        // Track state: 0 = title screen, 1 = viewing images
        let gameState = 0; 

        // If you want to cycle through multiple images on future taps, list them here!
        // Example: const imageList = ['myassss.jpg', 'pic2.jpg', 'pic3.png'];
        const imageList = ['myassss.jpg'];
        let currentImageIndex = 0;

        stage.addEventListener('click', () => {
            if (gameState === 0) {
                // Step 1: Hide the logo text
                logo.classList.add('fade-out');
                
                // Step 2: Fade in the image window after a tiny delay
                setTimeout(() => {
                    gameView.classList.add('active');
                    gameState = 1;
                }, 400);
                
            } else if (gameState === 1) {
                // Optional: If you upload more pictures later, this code cycles through them on tap
                if (imageList.length > 1) {
                    currentImageIndex = (currentImageIndex + 1) % imageList.length;
                    gameImage.src = imageList[currentImageIndex];
                }
            }
        });
    </script>

</body>
</html>
