<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* General Page Settings */
        body {
            background-color: #ede6c9; /* Beige canvas */
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
            cursor: pointer; /* Intuitively signals the page is clickable */
        }

        /* Hero Text Area (Initial Screen View) */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            transition: height 0.6s ease-in-out;
        }

        /* Big RALLI Text Styling */
        .brand-title {
            font-size: 48px;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: normal;
            margin: 0;
            user-select: none;
        }

        /* Fixed Row Grid for the 3 Cards (Initially hidden) */
        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 80px 20px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.8s;
        }

        .card {
            flex: 1;
            min-width: 0;
            max-width: 350px;
        }

        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid #333;
            display: block;
        }

        .card h3 {
            margin-top: 15px;
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Scroll Text Indicator & Game Section (Revealed on Scroll) */
        .scroll-hint {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 60px 0 40px 0;
            color: #666;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .game-section {
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .game-play-btn {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .game-play-btn:hover {
            transform: scale(1.05);
        }

        .game-play-btn img {
            width: 150px;
            height: auto;
            cursor: pointer;
        }

        /* Active State Classes triggered by JavaScript */
        body.revealed .hero-section {
            height: 40vh; /* Shrinks header down elegantly to make room for content */
        }

        body.revealed .main-container {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Class applied when scrolling happens */
        body.scrolled .scroll-hint,
        body.scrolled .game-section {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Step 1: Initial Entry View -->
    <header class="hero-section" id="hero">
        <h1 class="brand-title">RALLI</h1>
    </header>

    <!-- Step 2: Main Cards (Revealed after clicking anywhere) -->
    <main class="main-container" id="content-grid">
        <!-- Journey -->
        <div class="card">
            <img src="icon1.jpeg" alt="Journey">
            <h3>Journey</h3>
        </div>

        <!-- Concept -->
        <div class="card">
            <img src="icon2.jpeg" alt="Concept">
            <h3>Concept</h3>
        </div>

        <!-- Your Role -->
        <div class="card">
            <img src="icon3.jpg" alt="Your Role">
            <h3>Your Role</h3>
        </div>
    </main>

    <!-- Step 3: Game Section elements (Revealed only on scroll) -->
    <div class="scroll-hint">
        ↓ Scroll to play game
    </div>

    <section class="game-section">
        <a href="#" class="game-play-btn">
            <img src="gameicon.jpg" alt="Play Game">
        </a>
    </section>

    <!-- Behavior Controller Scripts -->
    <script>
        // Track the interactions
        let isRevealed = false;

        // 1. Listen for clicks anywhere on the page to reveal the 3 main cards
        document.body.addEventListener('click', function() {
            if (!isRevealed) {
                document.body.classList.add('revealed');
                isRevealed = true;
            }
        });

        // 2. Listen for scroll events to reveal the game section at the bottom
        window.addEventListener('scroll', function() {
            // Only trigger scroll fade-in if they've already clicked to open the page
            if (isRevealed && window.scrollY > 50) {
                document.body.classList.add('scrolled');
            }
        });
    </script>

</body>
</html>
