<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #F3E6BD; /* Pearl Beige */
            font-family: 'Playfair Display', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            color: #260808; /* Graphite */
        }

        /* Scrolling locked until landing text is clicked */
        .main-scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: hidden;
            scroll-behavior: smooth;
        }

        .section-view {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
            position: relative;
        }

        /* ----------------------------------
           SECTION 1: LANDING & DASHBOARD
        ---------------------------------- */
        #brand-logo {
            font-size: 5.5rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            cursor: pointer;
            user-select: none;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Completely hides RALLI. when clicked */
        #brand-logo.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            position: absolute; /* Takes it out of layout space so menu takes center stage */
        }

        /* Elegant SQUARE grid layout for navigation icons */
        .icon-menu-row {
            display: flex;
            gap: 40px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.8s ease 0.2s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
        }

        .icon-menu-row.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #260808;
            cursor: pointer;
        }

        /* Modified into a minimalist square card layout */
        .icon-square {
            width: 100px;
            height: 100px;
            border-radius: 0px; /* Force sharp square corners */
            border: 1px solid rgba(38, 8, 8, 0.25);
            background-color: #F3E6BD;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(38, 8, 8, 0.04);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        .icon-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .icon-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: lowercase;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        /* Square hover responses */
        .icon-wrapper:hover .icon-square {
            transform: scale(1.05);
            border-color: #260808;
        }
        .icon-wrapper:hover .icon-square img {
            transform: scale(1.08);
        }
        .icon-wrapper:hover .icon-label {
            opacity: 1;
            font-weight: 500;
        }

        /* Clear, minimal hint showing the user they can now slide down */
        .scroll-prompt {
            position: absolute;
            bottom: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
        }
        .scroll-prompt.visible {
            opacity: 0.5;
            transform: translateY(0);
        }

        /* ----------------------------------
           SECTION 2: SCROLL DOWN PLAY GAME
        ---------------------------------- */
        #game-view {
            background-color: #ebdcb2; /* Deeper background tone change */
            border-top: 1px solid rgba(38, 8, 8, 0.04);
        }

        .game-title {
            font-size: 2.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .game-display-box {
            width: 100%;
            max-width: 650px;
            height: 450px;
            background-color: rgba(38, 8, 8, 0.02);
            border: 1px solid rgba(38, 8, 8, 0.15);
            box-shadow: 0 20px 45px rgba(38, 8, 8, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-display-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            #brand-logo { font-size: 3.5rem; }
            .icon-menu-row { gap: 20px; }
            .icon-square { width: 80px; height: 80px; }
            .game-display-box { height: 320px; max-width: 90%; }
        }
    </style>
</head>
<body>

    <div class="main-scroll-container" id="scroll-wrapper">
        
        <!-- SECTION 1: Welcome Screen & Post-Click Icons -->
        <div class="section-view" id="landing-view">
            
            <h1 id="brand-logo" onclick="revealDashboard()">RALLI.</h1>

            <div class="icon-menu-row" id="menu-row">
                <!-- Icon 1: Journey -->
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon1.jpg" alt="Journey">
                    </div>
                    <span class="icon-label">journey</span>
                </div>

                <!-- Icon 2: Your Role -->
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon-role.jpg" alt="Your Role">
                    </div>
                    <span class="icon-label">your role</span>
                </div>

                <!-- Icon 3: Concept -->
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon3.jpg" alt="Concept">
                    </div>
                    <span class="icon-label">concept</span>
                </div>
            </div>

            <div class="scroll-prompt" id="scroll-hint">↓ Scroll to play game</div>
        </div>

        <!-- SECTION 2: Scroll Content Area -->
        <div class="section-view" id="game-view">
            <h2 class="game-title">Play Game</h2>
            
            <div class="game-display-box">
                <!-- The image rendered when scrolling all the way down -->
                <img src="journey-sketch.jpg" alt="Ralli Interactive Showcase Frame">
            </div>
        </div>

    </div>

    <script>
        function revealDashboard() {
            const scrollWrapper = document.getElementById('scroll-wrapper');
            const logo = document.getElementById('brand-logo');
            const menuRow = document.getElementById('menu-row');
            const scrollHint = document.getElementById('scroll-hint');

            // 1. Instantly vanish the logo completely
            logo.classList.add('hidden');
            
            // 2. Bring up the square dashboard selections immediately 
            menuRow.classList.add('visible');
            scrollHint.classList.add('visible');

            // 3. Unlocks user container scrolling
            scrollWrapper.style.overflowY = 'auto';
        }
    </script>

</body>
</html>
