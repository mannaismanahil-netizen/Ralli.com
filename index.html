<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* --- 1. YOUR ORIGINAL HOMEPAGE LAYOUT --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #eaddbe; /* Matches your site's background */
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Your Main Label/Header Area */
        .brand-header {
            margin-top: 60px;
            text-align: center;
        }
        
        .brand-header h1 {
            font-size: 4rem;
            letter-spacing: 6px;
            margin: 0;
            color: #2b221a;
        }

        /* Your 3 Original Navigation Icons Row */
        .nav-icons-container {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            margin-bottom: 100px; /* Creates the space to scroll down */
        }

        .nav-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(0,0,0,0.05); /* Placeholder for your 3 icons */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .nav-icon:hover {
            transform: scale(1.1);
        }


        /* --- 2. THE GAME SECTION (SCROLL DOWN TO SEE) --- */
        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 100px;
            width: 100%;
        }

        .game-title {
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: #2b221a;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* The Game Box Frame Container */
        .game-container-frame {
            position: relative;
            width: 90vw;
            max-width: 900px;
            aspect-ratio: 16 / 10;
            background-color: #e4d7b9;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* Inner screens */
        .game-inner-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Game Icon Button styling */
        .play-btn-wrapper {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            outline: none;
            width: 100%;
            height: 100%;
        }

        .play-btn-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .play-btn-wrapper:hover img {
            transform: scale(1.02);
        }

        /* Pick a box collage styling inside the frame */
        .collage-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .collage-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The 3 Interactive Boxes Zones */
        .boxes-interactive-overlay {
            position: absolute;
            bottom: 34%;
            left: 21%;
            width: 58%;   
            height: 30%;  
            display: flex;
            justify-content: space-between;
        }

        .box-target {
            width: 26%;
            height: 100%;
            background: rgba(255, 255, 255, 0.0);
            border: none;
            cursor: pointer;
            outline: none;
            border-radius: 12px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .box-target:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-8px); /* Lifts up nicely when hovered */
        }
    </style>
</head>
<body>

    <!-- 1. TOP OF THE PAGE: Brand Label -->
    <div class="brand-header">
        <h1>RALLI</h1>
    </div>

    <!-- 2. TOP OF THE PAGE: Your 3 Original Nav Icons -->
    <div class="nav-icons-container">
        <!-- Replace these with your actual 3 original icons/images if needed -->
        <div class="nav-icon" title="Icon 1">⒈</div>
        <div class="nav-icon" title="Icon 2">⒉</div>
        <div class="nav-icon" title="Icon 3">⒊</div>
    </div>


    <!-- 3. BOTTOM OF THE PAGE: The Game Section (Visible on Scroll) -->
    <div class="game-section">
        <h2 class="game-title">Play Game</h2>

        <div class="game-container-frame">
            
            <!-- STAGE 1: Shows just the Game Icon inside the section -->
            <div id="view-icon" class="game-inner-screen">
                <button class="play-btn-wrapper" id="trigger-play">
                    <img src="gameicon.jpg" alt="RALLI Game Icon">
                </button>
            </div>

            <!-- STAGE 2: Swaps to Pick a Box inside the same section when clicked -->
            <div id="view-game" class="game-inner-screen hidden">
                <div class="collage-wrapper">
                    <img src="pickabox.jpeg" alt="Pick a box" class="collage-bg">
                    
                    <!-- The 3 Interactive Box Targets -->
                    <div class="boxes-interactive-overlay">
                        <button class="box-target" id="box-jeans" title="Box 1"></button>
                        <button class="box-target" id="box-newspaper" title="Box 2"></button>
                        <button class="box-target" id="box-combo" title="Box 3"></button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const viewIcon = document.getElementById('view-icon');
        const viewGame = document.getElementById('view-game');
        const triggerPlay = document.getElementById('trigger-play');

        const btnJeans = document.getElementById('box-jeans');
        const btnNewspaper = document.getElementById('box-newspaper');
        const btnCombo = document.getElementById('box-combo');

        // Clicking the game icon swaps screens ONLY inside the game box container
        triggerPlay.addEventListener('click', () => {
            viewIcon.classList.add('hidden');
            viewGame.classList.remove('hidden');
        });

        // Box interactions
        btnJeans.addEventListener('click', () => { alert("Jeans box clicked!"); });
        btnNewspaper.addEventListener('click', () => { alert("Newspaper box clicked!"); });
        btnCombo.addEventListener('click', () => { alert("Combo box clicked!"); });
    </script>
</body>
</html>
