<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <!-- Premium editorial font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #F3E6BD; /* Pearl Beige */
            font-family: 'Cormorant Garamond', Georgia, serif;
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        /* Sleek entry animation styling */
        h1 {
            font-size: 4rem;
            font-weight: 300;
            color: #260808; /* Graphite */
            margin: 0;
            line-height: 1;
            white-space: nowrap;
            
            /* Applies the ultra-smooth luxury reveal effect */
            animation: sleekReveal 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand-name {
            font-weight: 500;
            text-transform: uppercase;
        }

        /* The sleek reveal effect: smooth fade, slight rise, and luxury letter expansion */
        @keyframes sleekReveal {
            0% {
                opacity: 0;
                letter-spacing: -2px;
                transform: translateY(15px);
            }
            30% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
                letter-spacing: 3px;
                transform: translateY(0);
            }
        }

        /* Responsive scaling for mobile devices */
        @media (max-width: 768px) {
            h1 { 
                font-size: 2.2rem; 
                white-space: normal;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Welcome to <span class="brand-name">RALLI</span>.</h1>
    </div>

</body>
</html>
