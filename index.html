<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* 1. KEEPING YOUR ORIGINAL BACKGROUND & LAYOUT */
        body {
            background-color: #ede6c9;
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
        }

        /* 2. INITIAL TEXT VIEW (Takes full screen) */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            cursor: pointer;
        }

        /* 3. MAIN CARDS GRID (Hidden on load) */
        .main-container {
            display: none; /* Hidden until clicked */
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            flex: 1;
            max-width: 350px;
        }

        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid #333;
        }

        /* 4. SCROLL INDICATOR & HALF-SCREEN GAME BUTTON */
        .scroll-hint {
            display: none; /* Hidden until clicked */
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 40px 0;
            color: #666;
        }

        .game-section {
            display: none; /* Hidden until clicked */
            height: 50vh; /* Takes up exactly half the screen */
            justify-content: center;
            align-items: center;
            padding-bottom: 50px;
        }

        .game-play-btn img {
            height: 80%; /* Scales the icon to fit comfortably inside the half-screen block */
            width: auto;
            cursor: pointer;
            object-fit: contain;
        }

        /* 5. INTERACTIVE STATES CONTROLLED BY JS */
        /* When clicked: hide text header, show the 3 icons & scroll hint */
        body.revealed .hero-section {
            display: none;
        }

        body.revealed .main-container,
        body.revealed .scroll-hint,
        body.revealed .game-section {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- Step 1: Just the brand text on load -->
    <header class="hero-section" id="hero">
        <h1 style="font-size: 48px; letter-spacing: 12px; font-weight: normal; margin: 0;">RALLI</h1>
    </header>

    <!-- Step 2: Clicking removes text, shows these 3 icons -->
    <main class="main-container">
        <div class="card">
            <img src="icon1.jpeg" alt="Journey">
            <h3 style="margin-top: 15px; font-size: 16px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Journey</h3>
        </div>

        <div class="card">
            <img src="icon2.jpeg" alt="Concept">
            <h3 style="margin-top: 15px; font-size: 16px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Concept</h3>
        </div>

        <div class="card">
            <img src="icon3.jpg" alt="Your Role">
            <h3 style="margin-top: 15px; font-size: 16px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Your Role</h3>
        </div>
    </main>

    <!-- Step 3: Scroll down to reveal the half-screen play icon -->
    <div class="scroll-hint">
        ↓ Scroll to play game
    </div>

    <section class="game-section">
        <a href="#" class="game-play-btn">
            <img src="gameicon.jpg" alt="Play Game">
        </a>
    </section>

    <!-- Simple click tracker -->
    <script>
        document.getElementById('hero').addEventListener('click', function() {
            document.body.classList.add('revealed');
        });
    </script>

</body>
</html>
