<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* General Page Settings */
        body {
            background-color: #ede6c9; /* Beige canvas */
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
        }

        /* The 3 Main Cards Grid (Journey, Concept, Your Role) */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 80px 20px 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            flex: 1;
            max-width: 350px;
        }

        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid #333;
        }

        .card h3 {
            margin-top: 15px;
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Scroll Text Indicator */
        .scroll-hint {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 40px 0;
            color: #666;
        }

        /* Centered Game Section */
        .game-section {
            padding-bottom: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-play-btn {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .game-play-btn:hover {
            transform: scale(1.05);
        }

        .game-play-btn img {
            width: 150px; /* Adjust size of your game icon here */
            height: auto;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Main Content Grid -->
    <main class="main-container">
        <!-- Journey -->
        <div class="card">
            <img src="icon1.jpeg" alt="Journey">
            <h3>Journey</h3>
        </div>

        <!-- Concept -->
        <div class="card">
            <img src="icon2.jpeg" alt="Concept">
            <h3>Concept</h3>
        </div>

        <!-- Your Role -->
        <div class="card">
            <img src="icon3.jpeg" alt="Your Role">
            <h3>Your Role</h3>
        </div>
    </main>

    <!-- Scroll Text -->
    <div class="scroll-hint">
        ↓ Scroll to play game
    </div>

    <!-- Game Section: Cleaned up to ONLY show the play icon -->
    <section class="game-section">
        <a href="#" class="game-play-btn">
            <img src="gameicon.jpg" alt="Play Game">
        </a>
    </section>

</body>
</html>
