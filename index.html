<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <style>
        /* Base Canvas Settings */
        body {
            background-color: #ede6c9;
            margin: 0;
            padding: 0;
            color: #333;
            text-align: center;
        }

        /* Initial Full-Screen Entry Text View */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            cursor: pointer;
        }

        /* Content Layout: 3 Cards Block (Journey, Concept, Your Role) */
        .main-container {
            display: none; /* Hidden until you click the text */
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding: 80px 20px 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .card {
            flex: 1;
            max-width: 350px;
        }

        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid #333;
        }

        /* Scroll Indicator */
        .scroll-hint {
            display: none; /* Hidden until click */
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 40px 0;
            color: #666;
        }

        /* Half-Screen Game Section Focus */
        .game-section {
            display: none; /* Hidden until click */
            height: 50vh; /* Takes up exactly half the screen */
            justify-content: center;
            align-items: center;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        .game-play-btn img {
            height: 80%; /* Fits the gameicon comfortably within the half-screen block */
            width: auto;
            cursor: pointer;
            object-fit: contain;
        }

        /* --- STATE LOGIC TRIGGERED BY CLICK --- */
        /* When clicked: hide text header, activate flex displays for layout items */
        body.revealed .hero-section {
            display: none;
        }

        body.revealed .main-container,
        body.revealed .scroll-hint,
        body.revealed .game-section {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- Step 1: Initial RALLI Title View -->
    <header class="hero-section" id="hero">
        <h1 style="font-size: 48px; letter-spacing: 12px; font-weight: normal; margin: 0;">RALLI</h1>
    </header>

    <!-- Step 2: Core Section Columns (Shown after text click) -->
    <main class="main-container">
        <!-- Journey Card -->
        <div class="card">
            <img src="icon1.jpeg" alt="Journey">
            <h3 style="margin-top: 15px; font-size: 16px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Journey</h3>
        </div>

        <!-- Concept Card -->
        <div class="card">
            <img src="icon2.jpeg" alt="Concept">
            <h3 style="margin-top: 15px; font-size: 16px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Concept</h3>
        </div>

        <!-- Your Role Card -->
        <div class="card">
            <img src="icon3.jpg" alt="Your Role">
            <h3 style="margin-top: 15px; font-size: 16px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase;">Your Role</h3>
        </div>
    </main>

    <!-- Step 3: Scroll Indicator and Half-Screen Game View -->
    <div class="scroll-hint">
        ↓ Scroll to play game
    </div>

    <section class="game-section">
        <a href="#" class="game-play-btn">
            <img src="gameicon.jpg" alt="Play Game">
        </a>
    </section>

    <!-- Click handler to transition layout states -->
    <script>
        document.getElementById('hero').addEventListener('click', function() {
            document.body.classList.add('revealed');
        });
    </script>

</body>
</html>
