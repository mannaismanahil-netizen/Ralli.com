<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #F3E6BD; /* Pearl Beige */
            font-family: 'Playfair Display', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            color: #260808; /* Graphite */
            scroll-behavior: smooth;
        }

        /* Viewport blocks for snapping sections */
        .section-view {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
            position: relative;
        }

        /* ----------------------------------
           SECTION 1: LANDING & DASHBOARD
        ---------------------------------- */
        #landing-view {
            overflow: hidden;
        }

        #brand-logo {
            font-size: 5.5rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            cursor: pointer;
            user-select: none;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), font-size 0.8s ease;
        }

        /* Shifts the main title up when tapped */
        #brand-logo.shifted {
            transform: translateY(-40px);
        }

        /* Icon layout that drops down under title */
        .icon-menu-row {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-menu-row.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #260808;
            cursor: pointer;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(38, 8, 8, 0.25);
            background-color: #F3E6BD;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(38, 8, 8, 0.06);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        .icon-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .icon-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: lowercase;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .icon-wrapper:hover .icon-circle {
            transform: scale(1.06);
            border-color: #260808;
        }
        .icon-wrapper:hover .icon-circle img {
            transform: scale(1.1);
        }
        .icon-wrapper:hover .icon-label {
            opacity: 1;
            font-weight: 500;
        }

        /* Subtle scroll prompt text */
        .scroll-prompt {
            position: absolute;
            bottom: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
        }
        .scroll-prompt.visible {
            opacity: 0.5;
            transform: translateY(0);
        }

        /* ----------------------------------
           SECTION 2: PLAY GAME AREA
        ---------------------------------- */
        #game-view {
            background-color: #ebdcb2; /* Slightly darker shift for section depth */
            border-top: 1px solid rgba(38, 8, 8, 0.05);
        }

        .game-title {
            font-size: 2.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .game-display-box {
            width: 100%;
            max-width: 650px;
            height: 450px;
            border-radius: 2px;
            background-color: rgba(38, 8, 8, 0.03);
            border: 1px solid rgba(38, 8, 8, 0.15);
            box-shadow: 0 20px 45px rgba(38, 8, 8, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-display-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            #brand-logo { font-size: 3.5rem; }
            .icon-menu-row { gap: 20px; }
            .icon-circle { width: 65px; height: 65px; }
            .game-display-box { height: 320px; }
        }
    </style>
</head>
<body>

    <!-- SECTION 1: Welcome Splash & Navigation Dashboard -->
    <div class="section-view" id="landing-view">
        
        <h1 id="brand-logo" onclick="revealDashboard()">RALLI.</h1>

        <div class="icon-menu-row" id="menu-row">
            <!-- Icon 1: Journey -->
            <div class="icon-wrapper">
                <div class="icon-circle">
                    <img src="icon1.jpg" alt="Our Journey">
                </div>
                <span class="icon-label">journey</span>
            </div>

            <!-- Icon 2: Your Role -->
            <div class="icon-wrapper">
                <div class="icon-circle">
                    <img src="icon-role.jpg" alt="Your Role">
                </div>
                <span class="icon-label">your role</span>
            </div>

            <!-- Icon 3: Concept Design -->
            <div class="icon-wrapper">
                <div class="icon-circle">
                    <img src="icon3.jpg" alt="Concept View">
                </div>
                <span class="icon-label">concept</span>
            </div>
        </div>

        <div class="scroll-prompt" id="scroll-hint">↓ Scroll to play game</div>
    </div>

    <!-- SECTION 2: Interactive Game Block -->
    <div class="section-view" id="game-view">
        <h2 class="game-title">Play Game</h2>
        
        <div class="game-display-box">
            <!-- Automatically loads your sketch collection here -->
            <img src="journey-sketch.jpg" alt="Ralli Core Interface View">
        </div>
    </div>

    <script>
        function revealDashboard() {
            const logo = document.getElementById('brand-logo');
            const menuRow = document.getElementById('menu-row');
            const scrollHint = document.getElementById('scroll-hint');

            logo.classList.add('shifted');
            menuRow.classList.add('visible');
            scrollHint.classList.add('visible');
        }
    </script>

</body>
</html>
