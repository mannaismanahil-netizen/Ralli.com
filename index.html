<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <!-- Importing a clean modern font and our luxury serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #F3E6BD; /* Pearl Beige */
            -webkit-font-smoothing: antialiased;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        /* Pure, elegant fade entry */
        .text-line {
            color: #260808; /* Graphite */
            margin: 0;
            white-space: nowrap;
            animation: cleanFadeIn 1.8s ease-out forwards;
        }

        /* Modern sans-serif style for the intro part so it stands out sharply */
        .welcome-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: lowercase;
            vertical-align: middle;
        }

        /* Stronger weight and distinct styling for the brand name */
        .brand-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 4.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-left: 12px;
            vertical-align: middle;
        }

        /* Simple, crisp fade animation */
        @keyframes cleanFadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* Mobile layout fixes */
        @media (max-width: 768px) {
            .text-line { 
                white-space: normal;
                line-height: 1.4;
            }
            .welcome-text { font-size: 1.6rem; }
            .brand-name { 
                font-size: 3rem; 
                display: block; 
                margin-left: 0; 
                margin-top: 5px; 
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="text-line">
            <span class="welcome-text">welcome to</span><span class="brand-name">RALLI</span>.
        </h1>
    </div>

</body>
</html>
