<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #F3E6BD; /* Pearl Beige */
            font-family: 'Playfair Display', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            color: #260808; /* Graphite */
        }

        .main-scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: hidden;
            scroll-behavior: smooth;
        }

        .section-view {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
            position: relative;
        }

        /* ----------------------------------
           SECTION 1: LANDING & DASHBOARD
        ---------------------------------- */
        .logo-center-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        #brand-logo {
            font-size: 5.5rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            padding: 0;
            cursor: pointer;
            user-select: none;
            opacity: 1;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #brand-logo.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .icon-menu-row {
            display: flex;
            flex-direction: row;
            width: 96%;
            max-width: 1600px;
            justify-content: center;
            gap: 4%;
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
            transition: opacity 0.8s ease 0.1s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
        }

        .icon-menu-row.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex: 1;
            max-width: 440px; 
            text-decoration: none;
            color: #260808;
            cursor: pointer;
        }

        .icon-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(38, 8, 8, 0.2);
            background-color: rgba(38, 8, 8, 0.02);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(38, 8, 8, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .icon-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .icon-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s ease, letter-spacing 0.3s ease;
        }

        .icon-wrapper:hover .icon-square {
            transform: translateY(-8px) scale(1.02);
            border-color: #260808;
            box-shadow: 0 25px 50px rgba(38, 8, 8, 0.1);
        }
        .icon-wrapper:hover .icon-square img {
            transform: scale(1.05);
        }
        .icon-wrapper:hover .icon-label {
            opacity: 1;
            letter-spacing: 3px;
        }

        .scroll-prompt {
            position: absolute;
            bottom: 35px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
        }
        .scroll-prompt.visible {
            opacity: 0.4;
            transform: translateY(0);
        }

        /* ----------------------------------
           SECTION 2: SCROLL DOWN PLAY GAME
        ---------------------------------- */
        #game-view {
            background-color: #ebdcb2;
            border-top: 1px solid rgba(38, 8, 8, 0.04);
        }

        .game-title {
            font-size: 2.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .game-display-box {
            width: 100%;
            max-width: 750px;
            height: 500px;
            background-color: rgba(38, 8, 8, 0.02);
            border: 1px solid rgba(38, 8, 8, 0.15);
            box-shadow: 0 20px 45px rgba(38, 8, 8, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .icon-trigger-btn {
            background: none;
            border: none;
            width: 100%;
            height: 100%;
            padding: 0;
            cursor: pointer;
            outline: none;
        }

        .icon-trigger-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .icon-trigger-btn:hover img {
            transform: scale(1.03);
        }

        /* ----------------------------------
           FULLSCREEN OVERLAY GAME CONFIG
        ---------------------------------- */
        .fullscreen-game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Darker backdrop to emphasize layout graphics */
            z-index: 9999; /* Forces layer above everything else */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .fullscreen-game-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .collage-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px; /* Limits landscape stretch on giant monitors */
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .collage-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps whole pickabox.jpeg completely visible without cropping */
        }

        /* Invisible interactive hitboxes perfectly layered over the boxes */
        .boxes-hitbox-overlay {
            position: absolute;
            bottom: 34%;
            left: 21%;
            width: 58%;
            height: 30%;
            display: flex;
            justify-content: space-between;
        }

        .box-hitbox {
            width: 26%;
            height: 100%;
            background: rgba(255, 255, 255, 0.0);
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 12px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .box-hitbox:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.04);
        }

        /* Close Button styling */
        .close-game-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            background: none;
            border: none;
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.6;
            z-index: 10000;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .close-game-btn:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        /* ----------------------------------
           MOBILE STACKED CONFIGURATION
        ---------------------------------- */
        @media (max-width: 768px) {
            #brand-logo { font-size: 3.5rem; }
            
            #landing-view {
                height: auto;
                min-height: 100vh;
                padding-top: 60px;
                padding-bottom: 100px;
            }

            .icon-menu-row {
                flex-direction: column;
                align-items: center;
                width: 90%;
                gap: 50px; 
            }

            .icon-wrapper {
                width: 100%;
                max-width: 85vw;
            }

            .icon-square {
                width: 100%;
                height: 45vh; 
                aspect-ratio: auto; 
            }

            .icon-label { font-size: 0.85rem; }
            .game-display-box { height: 320px; max-width: 90%; }
            .close-game-btn { top: 20px; right: 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="main-scroll-container" id="scroll-wrapper">
        
        <!-- SECTION 1: Welcome Screen -->
        <div class="section-view" id="landing-view">
            
            <!-- Logo container handling absolute centering -->
            <div class="logo-center-container" id="logo-wrap">
                <h1 id="brand-logo" onclick="revealDashboard()">RALLI.</h1>
            </div>

            <div class="icon-menu-row" id="menu-row">
                <!-- Icon 1: Journey -->
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon1.jpeg" alt="Journey">
                    </div>
                    <span class="icon-label">Journey</span>
                </div>

                <!-- Icon 2: Concept (Middle) -->
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon3.jpg" alt="Concept">
                    </div>
                    <span class="icon-label">Concept</span>
                </div>

                <!-- Icon 3: Your Role -->
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon2.jpeg" alt="Your Role">
                    </div>
                    <span class="icon-label">Your Role</span>
                </div>
            </div>

            <div class="scroll-prompt" id="scroll-hint">↓ Scroll to play game</div>
        </div>

        <!-- SECTION 2: Scroll Content Area -->
        <div class="section-view" id="game-view">
            <h2 class="game-title">Play Game</h2>
            
            <div class="game-display-box">
                <!-- Clickable Game Icon that triggers the Fullscreen Experience -->
                <button class="icon-trigger-btn" id="start-game-trigger">
                    <img src="gameicon.jpg" alt="Game Icon View">
                </button>
            </div>
        </div>

    </div>

    <!-- STAGE 2: WHOLE SCREEN FULLSCREEN OVERLAY PORTAL -->
    <div id="whole-screen-game" class="fullscreen-game-overlay">
        <button class="close-game-btn" id="close-game-trigger">✕ Close</button>
        
        <div class="collage-container">
            <img src="pickabox.jpeg" alt="Pick a Box Collage">
            
            <!-- Target interactive box layers -->
            <div class="boxes-hitbox-overlay">
                <button class="box-hitbox" id="btn-left" title="Left Box"></button>
                <button class="box-hitbox" id="btn-mid" title="Middle Box"></button>
                <button class="box-hitbox" id="btn-right" title="Right Box"></button>
            </div>
        </div>
    </div>

    <script>
        function revealDashboard() {
            const scrollWrapper = document.getElementById('scroll-wrapper');
            const logo = document.getElementById('brand-logo');
            const logoWrap = document.getElementById('logo-wrap');
            const menuRow = document.getElementById('menu-row');
            const scrollHint = document.getElementById('scroll-hint');

            logo.classList.add('hidden');
            
            // Clean dynamic exit for the logo container
            setTimeout(() => {
                logoWrap.style.display = 'none';
            }, 400);

            menuRow.classList.add('visible');
            scrollHint.classList.add('visible');

            scrollWrapper.style.overflowY = 'auto';
        }

        // FULLSCREEN GAME INTERACTIONS CONTROLLER
        const mainScrollContainer = document.getElementById('scroll-wrapper');
        const wholeScreenGame = document.getElementById('whole-screen-game');
        const startGameTrigger = document.getElementById('start-game-trigger');
        const closeGameTrigger = document.getElementById('close-game-trigger');

        const btnLeft = document.getElementById('btn-left');
        const btnMid = document.getElementById('btn-mid');
        const btnRight = document.getElementById('btn-right');

        // Tap Game Icon -> Open whole screen view & lock background site scrolling
        startGameTrigger.addEventListener('click', () => {
            wholeScreenGame.classList.add('active');
            mainScrollContainer.style.overflowY = 'hidden';
        });

        // Tap Close -> Return back to standard webpage layout view
        closeGameTrigger.addEventListener('click', () => {
            wholeScreenGame.classList.remove('active');
            mainScrollContainer.style.overflowY = 'auto';
        });

        // Interactive Choice alerts
        btnLeft.addEventListener('click', () => { alert("Box 1 selected! Jeans coming soon."); });
        btnMid.addEventListener('click', () => { alert("Box 2 selected! Newspaper coming soon."); });
        btnRight.addEventListener('click', () => { alert("Box 3 selected! Combo coming soon."); });
    </script>

</body>
</html>
