<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #F3E6BD; /* Pearl Beige */
            font-family: 'Playfair Display', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            color: #260808; /* Graphite */
        }

        .main-scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: hidden;
            scroll-behavior: smooth;
        }

        .section-view {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
            position: relative;
        }

        /* Top Header Symbol (Where the world is made) */
        .top-logo-header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .top-logo-header.visible {
            opacity: 1;
        }
        .top-logo-header img {
            height: 55px;
            width: auto;
        }

        /* Original Text Entrance Heading */
        .logo-center-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        #brand-logo-text {
            font-size: 5.5rem;
            font-weight: 400;
            letter-spacing: 4px;
            cursor: pointer;
            user-select: none;
            opacity: 1;
            margin: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #brand-logo-text.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .icon-menu-row {
            display: flex;
            flex-direction: row;
            width: 96%;
            max-width: 1600px;
            justify-content: center;
            gap: 4%;
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
            transition: opacity 0.8s ease 0.1s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
        }

        .icon-menu-row.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex: 1;
            max-width: 440px; 
            text-decoration: none;
            color: #260808;
            cursor: pointer;
        }

        .icon-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(38, 8, 8, 0.2);
            background-color: rgba(38, 8, 8, 0.02);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(38, 8, 8, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .icon-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .icon-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s ease, letter-spacing 0.3s ease;
        }

        .icon-wrapper:hover .icon-square {
            transform: translateY(-8px) scale(1.02);
            border-color: #260808;
            box-shadow: 0 25px 50px rgba(38, 8, 8, 0.1);
        }
        .icon-wrapper:hover .icon-square img {
            transform: scale(1.05);
        }
        .icon-wrapper:hover .icon-label {
            opacity: 1;
            letter-spacing: 3px;
        }

        .scroll-prompt {
            position: absolute;
            bottom: 35px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
        }
        .scroll-prompt.visible {
            opacity: 0.4;
            transform: translateY(0);
        }

        /* ----------------------------------
           SECTION 2: SCROLL DOWN PLAY GAME
        ---------------------------------- */
        #game-view {
            background-color: #ebdcb2;
            border-top: 1px solid rgba(38, 8, 8, 0.04);
        }

        .game-title {
            font-size: 2.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .game-display-box {
            width: 100%;
            max-width: 750px;
            height: 500px;
            background-color: rgba(38, 8, 8, 0.02);
            border: 1px solid rgba(38, 8, 8, 0.15);
            box-shadow: 0 20px 45px rgba(38, 8, 8, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .icon-trigger-btn {
            background: none;
            border: none;
            width: 100%;
            height: 100%;
            padding: 0;
            cursor: pointer;
            outline: none;
        }

        .icon-trigger-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .icon-trigger-btn:hover img {
            transform: scale(1.03);
        }

        /* ----------------------------------
           DYNAMIC FULLSCREEN GAME OVERLAY 
        ---------------------------------- */
        .fullscreen-game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, background-color 0.4s ease;
            background-color: #F3E6BD; /* Matches your main beige theme initially */
        }

        .fullscreen-game-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .collage-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .collage-container img {
            width: 100vw;
            height: 100vh;
            object-fit: contain; 
        }

        .boxes-hitbox-overlay {
            position: absolute;
            bottom: 34%;
            left: 21%;
            width: 58%;
            height: 30%;
            display: flex;
            justify-content: space-between;
            z-index: 10001;
        }

        .box-hitbox {
            width: 26%;
            height: 100%;
            background: rgba(255, 255, 255, 0.0);
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .box-hitbox:hover {
            background-color: rgba(255, 255, 255, 0.12);
        }

        .close-game-btn, .back-to-boxes-btn {
            position: absolute;
            background: rgba(38, 8, 8, 0.75);
            border: none;
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            padding: 10px 20px;
            border-radius: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10010;
            backdrop-filter: blur(4px);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .close-game-btn {
            top: 25px;
            right: 30px;
        }

        .back-to-boxes-btn {
            top: 25px;
            left: 30px;
        }

        .close-game-btn:hover, .back-to-boxes-btn:hover {
            background: rgba(38, 8, 8, 0.95);
            transform: scale(1.02);
        }

        /* ----------------------------------
           BOX REVEAL LAYER
        ---------------------------------- */
        .box-result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10002;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box-result-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .box-result-screen img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        .inner-item-hotspot {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0);
            border: none;
            outline: none;
            cursor: pointer;
            z-index: 10003;
        }

        /* ----------------------------------
           MANNEQUIN CANVAS LAYER
        ---------------------------------- */
        .mannequin-workspace-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10004;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mannequin-workspace-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .mannequin-workspace-screen img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        /* ----------------------------------
           MOBILE CONFIGURATION
        ---------------------------------- */
        @media (max-width: 768px) {
            #brand-logo-text { font-size: 3.8rem; }
            
            #landing-view {
                height: auto;
                min-height: 100vh;
                padding-top: 100px;
                padding-bottom: 100px;
            }

            .icon-menu-row {
                flex-direction: column;
                align-items: center;
                width: 90%;
                gap: 50px; 
            }

            .icon-wrapper {
                width: 100%;
                max-width: 85vw;
            }

            .icon-square {
                width: 100%;
                height: 45vh; 
                aspect-ratio: auto; 
            }

            .icon-label { font-size: 0.85rem; }
            .game-display-box { height: 320px; max-width: 90%; }
            .close-game-btn { top: 20px; right: 20px; }
            .back-to-boxes-btn { top: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-scroll-container" id="scroll-wrapper">
        
        <div class="section-view" id="landing-view">
            
            <!-- Small Symbol Header Area -->
            <div class="top-logo-header" id="top-symbol">
                <img src="logo.png" alt="RALLI Symbol Header">
            </div>

            <!-- Original Text Entrance Headliner -->
            <div class="logo-center-container" id="logo-wrap">
                <h1 id="brand-logo-text" onclick="revealDashboard()">RALLI.</h1>
            </div>

            <div class="icon-menu-row" id="menu-row">
                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon1.jpeg" alt="Journey">
                    </div>
                    <span class="icon-label">Journey</span>
                </div>

                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon3.jpg" alt="Concept">
                    </div>
                    <span class="icon-label">Concept</span>
                </div>

                <div class="icon-wrapper">
                    <div class="icon-square">
                        <img src="icon2.jpeg" alt="Your Role">
                    </div>
                    <span class="icon-label">Your Role</span>
                </div>
            </div>

            <div class="scroll-prompt" id="scroll-hint">↓ Scroll to play game</div>
        </div>

        <div class="section-view" id="game-view">
            <h2 class="game-title">Play Game</h2>
            
            <div class="game-display-box">
                <button class="icon-trigger-btn" id="start-game-trigger">
                    <img src="gameicon.jpg" alt="Game Icon View">
                </button>
            </div>
        </div>

    </div>

    <!-- OVERLAY PORTAL CONTAINER (Background tints dynamically update based on choice) -->
    <div id="whole-screen-game" class="fullscreen-game-overlay">
        <button class="close-game-btn" id="close-game-trigger">✕ Close</button>
        <button class="back-to-boxes-btn" id="back-to-boxes-trigger" style="display: none;">← Back</button>
        
        <div class="collage-container" id="selection-collage-view">
            <img src="pickabox.jpeg" alt="Pick a Box Collage">
            
            <div class="boxes-hitbox-overlay">
                <button class="box-hitbox" id="btn-left" title="Left Box"></button>
                <button class="box-hitbox" id="btn-mid" title="Middle Box"></button>
                <button class="box-hitbox" id="btn-right" title="Right Box"></button>
            </div>
        </div>

        <div class="box-result-screen" id="result-overlay">
            <img src="" id="result-img-frame" alt="Box Prize Content">
            <button class="inner-item-hotspot" id="box-contents-hotspot" title="Interact with box items"></button>
        </div>

        <div class="mannequin-workspace-screen" id="mannequin-overlay">
            <img src="mannequin-view.png" alt="Mannequin Dress Studio Workspace">
        </div>
    </div>

    <script>
        let currentDepthStage = 1; 

        const mainScrollContainer = document.getElementById('scroll-wrapper');
        const wholeScreenGame = document.getElementById('whole-screen-game');
        const startGameTrigger = document.getElementById('start-game-trigger');
        const closeGameTrigger = document.getElementById('close-game-trigger');
        const backToBoxesTrigger = document.getElementById('back-to-boxes-trigger');
        
        const resultOverlay = document.getElementById('result-overlay');
        const resultImgFrame = document.getElementById('result-img-frame');
        const boxContentsHotspot = document.getElementById('box-contents-hotspot');
        const mannequinOverlay = document.getElementById('mannequin-overlay');

        const btnLeft = document.getElementById('btn-left');
        const btnMid = document.getElementById('btn-mid');
        const btnRight = document.getElementById('btn-right');

        function revealDashboard() {
            const scrollWrapper = document.getElementById('scroll-wrapper');
            const logoText = document.getElementById('brand-logo-text');
            const logoWrap = document.getElementById('logo-wrap');
            const menuRow = document.getElementById('menu-row');
            const scrollHint = document.getElementById('scroll-hint');
            const topSymbol = document.getElementById('top-symbol');

            logoText.classList.add('hidden');
            setTimeout(() => { 
                logoWrap.style.display = 'none'; 
                topSymbol.classList.add('visible'); // Reveals small sewing symbol up top
            }, 400);

            menuRow.classList.add('visible');
            scrollHint.classList.add('visible');
            scrollWrapper.style.overflowY = 'auto';
        }

        startGameTrigger.addEventListener('click', () => {
            wholeScreenGame.style.backgroundColor = '#F3E6BD'; // Main beige backdrop
            wholeScreenGame.classList.add('active');
            mainScrollContainer.style.overflowY = 'hidden';
            currentDepthStage = 1;
            updateNavigationControls();
        });

        function displayBoxPrize(imgSrc, bgColor) {
            wholeScreenGame.style.backgroundColor = bgColor; // Shifts backdrop frame color instantly
            resultImgFrame.src = imgSrc;
            resultOverlay.classList.add('active');
            currentDepthStage = 2;
            updateNavigationControls();
        }

        boxContentsHotspot.addEventListener('click', () => {
            mannequinOverlay.classList.add('active');
            currentDepthStage = 3;
            updateNavigationControls();
        });

        backToBoxesTrigger.addEventListener('click', () => {
            if (currentDepthStage === 3) {
                mannequinOverlay.classList.remove('active');
                currentDepthStage = 2;
            } else if (currentDepthStage === 2) {
                resultOverlay.classList.remove('active');
                resultImgFrame.src = "";
                wholeScreenGame.style.backgroundColor = '#F3E6BD'; // Resets backdrop to selection beige
                currentDepthStage = 1;
            }
            updateNavigationControls();
        });

        closeGameTrigger.addEventListener('click', () => {
            wholeScreenGame.classList.remove('active');
            mannequinOverlay.classList.remove('active');
            resultOverlay.classList.remove('active');
            resultImgFrame.src = "";
            currentDepthStage = 1;
            mainScrollContainer.style.overflowY = 'auto';
            updateNavigationControls();
        });

        function updateNavigationControls() {
            if (currentDepthStage === 1) {
                backToBoxesTrigger.style.display = 'none';
            } else {
                backToBoxesTrigger.style.display = 'block';
            }
        }

        // Click actions route custom images along with matching backdrop canvas color tints
        btnLeft.addEventListener('click', () => { displayBoxPrize('jeans-box.png', '#2d4a6b'); });       // Indigo Blue
        btnMid.addEventListener('click', () => { displayBoxPrize('newspaper-box.png', '#e6e6e6'); });   // Newspaper Light Gray
        btnRight.addEventListener('click', () => { displayBoxPrize('combo-box.png', '#d9af82'); });     // Warm Accent Ochre
    </script>

</body>
</html>
